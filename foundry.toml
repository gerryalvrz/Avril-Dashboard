[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/openzeppelin-contracts/lib/forge-std/src/"
]
